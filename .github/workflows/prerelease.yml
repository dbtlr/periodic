name: Prerelease tagger

# Every build-affecting push to main auto-tags a vX.Y.Z-next.N prerelease, which
# the dist release workflow then builds + publishes (release.yml already flags
# `-` (prerelease) tags with --prerelease). The path filter is the changeset
# analyzer: a docs-only merge doesn't match, so no prerelease is produced.
#
# The tag is pushed with a PAT (secrets.RELEASE_TAG_PAT, needs `contents: write`)
# rather than the default GITHUB_TOKEN: a GITHUB_TOKEN-pushed tag does NOT trigger
# release.yml's `push: tags` (GitHub's anti-recursion rule), but a PAT-pushed tag
# does. A deploy key works equally well if you prefer.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "build.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "dist-workspace.toml"
      - ".github/workflows/release.yml"
      - ".github/workflows/prerelease.yml"

# Serialize so two quick merges can't race on "highest + 1".
concurrency:
  group: prerelease-tagger
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.RELEASE_TAG_PAT }}

      - name: Compute and push the prerelease tag
        run: |
          set -euo pipefail
          # Annotated tags need a committer identity; the runner has none.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          ver=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/^version = "([^"]+)".*/\1/')
          case "$ver" in
            *-next)
              # Counter = highest existing vX.Y.Z-next.N for this base, + 1.
              # Only real prerelease builds create tags, so noop merges never
              # advance it; robust to pruning (we keep the max) and history shape.
              max=0
              for t in $(git tag -l "v${ver}.*"); do
                n="${t#v${ver}.}"
                case "$n" in (*[!0-9]*) continue ;; esac
                if [ "$n" -gt "$max" ]; then max="$n"; fi
              done
              n=$((max + 1))
              tag="v${ver}.${n}"
              echo "tagging $tag"
              git tag -a "$tag" -m "Prerelease $tag"
              git push origin "$tag"
              echo "pushed $tag — release.yml builds + publishes the prerelease"
              ;;
            *)
              echo "Cargo.toml version $ver is not a -next dev version; no prerelease."
              echo "(The version guard enforces the release/next-cycle invariant.)"
              ;;
          esac
