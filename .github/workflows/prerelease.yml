name: Prerelease tagger

# Every build-affecting push to main rolls a single prerelease tag matching the
# Cargo.toml version (e.g. v0.1.0-next), which the dist release workflow then
# builds + publishes (release.yml flags `-` (prerelease) tags with --prerelease).
#
# cargo-dist requires the git tag's version to equal the Cargo.toml version, so
# the tag carries no counter — it is *rolled* (deleted + recreated at the new
# HEAD) on each merge. `self-update --next` always resolves to this latest
# prerelease. The path filter is the changeset analyzer: a docs-only merge
# doesn't match, so no prerelease is produced.
#
# The tag is pushed with a PAT (secrets.RELEASE_TAG_PAT, needs `contents: write`)
# rather than the default GITHUB_TOKEN: a GITHUB_TOKEN-pushed tag does NOT trigger
# release.yml's `push: tags` (GitHub's anti-recursion rule), but a PAT-pushed tag
# does. The same PAT authorizes the `gh release delete` below.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "build.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "dist-workspace.toml"
      - ".github/workflows/release.yml"
      - ".github/workflows/prerelease.yml"

# Serialize so two quick merges can't race on the rolling tag.
concurrency:
  group: prerelease-tagger
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  tag:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.RELEASE_TAG_PAT }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.RELEASE_TAG_PAT }}

      - name: Roll the prerelease tag
        run: |
          set -euo pipefail
          # Annotated tags need a committer identity; the runner has none.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          ver=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/^version = "([^"]+)".*/\1/')
          case "$ver" in
            *-next)
              tag="v${ver}"
              # Remove the prior rolling prerelease so the dist release workflow's
              # `gh release create` doesn't collide. --cleanup-tag drops the tag too;
              # the explicit ref delete covers a tag with no release object.
              gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
              git push origin ":refs/tags/${tag}" 2>/dev/null || true
              # Recreate at the merge commit; the PAT push triggers release.yml.
              git tag -a "$tag" -m "Rolling prerelease $tag"
              git push origin "$tag"
              echo "rolled $tag to $(git rev-parse --short HEAD)"
              ;;
            *)
              echo "Cargo.toml version $ver is not a -next dev version; no prerelease."
              echo "(The version guard enforces the release/next-cycle invariant.)"
              ;;
          esac
