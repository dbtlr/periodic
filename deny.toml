[graph]
all-features = true

[advisories]
yanked = "deny"
unmaintained = "workspace"

[licenses]
# Exactly the licenses present in the current tree. A new dependency that
# introduces another license (e.g. the rustls/webpki stack `periodic
# self-update` will pull, typically CDLA-Permissive-2.0) intentionally trips
# this gate so the license gets a deliberate review before being allowed.
allow = [
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
